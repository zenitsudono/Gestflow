version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: gestiflow_db
    environment:
      POSTGRES_DB: ${DB_NAME:-gestiflow_db}
      POSTGRES_USER: ${DB_USER:-gestiflow_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gestiflow_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: gestiflow_redis
    ports:
      - "6379:6379"
    restart: always

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gestiflow_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-this-in-production-!gestiflow!}
      - DB_NAME=${DB_NAME:-gestiflow_db}
      - DB_USER=${DB_USER:-gestiflow_user}
      - DB_PASSWORD=${DB_PASSWORD:-gestiflow_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    restart: always

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gestiflow_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-this-in-production-!gestiflow!}
      - DB_NAME=${DB_NAME:-gestiflow_db}
      - DB_USER=${DB_USER:-gestiflow_user}
      - DB_PASSWORD=${DB_PASSWORD:-gestiflow_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    restart: always

  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: gestiflow_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DEBUG=True
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-this-in-production-!gestiflow!}
      - DB_NAME=${DB_NAME:-gestiflow_db}
      - DB_USER=${DB_USER:-gestiflow_user}
      - DB_PASSWORD=${DB_PASSWORD:-gestiflow_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    depends_on:
      - db
      - redis
    restart: always

  nginx:
    image: nginx:alpine
    container_name: gestiflow_nginx
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "80:80"
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
