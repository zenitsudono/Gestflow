# Rate limiting zone for APIs
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

upstream web_app {
    server web:8000;
}

server {
    listen 80;
    server_name localhost;
    
    # Redirect all HTTP requests to HTTPS (commented out by default for local development ease)
    # return 301 https://$host$request_uri;
    
    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web_app;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
        
        # Apply API rate limit to endpoints
        limit_req zone=api_limit burst=20 nodelay;
    }
}

