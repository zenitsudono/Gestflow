<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - GestiFlow</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .text-primary-navy {
            color: #1F4E79;
        }
        .bg-primary-navy {
            background-color: #1F4E79;
        }
        .border-primary-navy {
            border-color: #1F4E79;
        }
        .focus-ring-navy:focus {
            box-shadow: 0 0 0 0.25rem rgba(31, 78, 121, 0.25);
            border-color: #1F4E79;
        }
    </style>
</head>
<body class="h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-2xl shadow-xl border border-slate-100">
        <div>
            <!-- Logo placeholder or text -->
            <div class="flex justify-center">
                <div class="h-12 w-12 rounded-xl bg-primary-navy flex items-center justify-center text-white font-bold text-2xl shadow-md">
                    G
                </div>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-slate-900 tracking-tight">
                Welcome to GestiFlow
            </h2>
            <p class="mt-2 text-center text-sm text-slate-500">
                Sign in to manage resources and access analytics.
            </p>
        </div>

        {% if error %}
        <div class="alert alert-danger py-2 px-3 rounded-lg text-sm flex items-center gap-2 border-none bg-red-50 text-red-700" role="alert">
            <svg class="h-5 w-5 fill-current" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/>
            </svg>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form class="mt-8 space-y-6" action="{% url 'login' %}" method="POST" x-data="{ email: '', password: '' }">
            {% csrf_token %}
            <input type="hidden" name="remember" value="true">
            <div class="rounded-md space-y-4">
                <div>
                    <label for="email-address" class="block text-sm font-medium text-slate-700 mb-1">Email address</label>
                    <input id="email-address" name="email" type="email" autocomplete="email" required 
                           x-model="email"
                           class="form-control rounded-xl py-2.5 px-3.5 text-slate-900 border border-slate-300 focus-ring-navy focus:outline-none focus:ring-2 focus:ring-offset-2" 
                           placeholder="name@company.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required 
                           x-model="password"
                           class="form-control rounded-xl py-2.5 px-3.5 text-slate-900 border border-slate-300 focus-ring-navy focus:outline-none focus:ring-2 focus:ring-offset-2" 
                           placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember_me" name="remember_me" type="checkbox" 
                           class="h-4 w-4 text-sky-600 focus:ring-sky-500 border-slate-300 rounded">
                    <label for="remember_me" class="ml-2 block text-sm text-slate-600">
                        Remember me
                    </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-sky-600 hover:text-sky-500">
                        Forgot your password?
                    </a>
                </div>
            </div>

            <div>
                <button type="submit" 
                        class="group relative w-full flex justify-center py-2.5 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-primary-navy hover:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-slate-900 transition-colors duration-150 shadow-md">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</body>
</html>
